{% extends "layout.html" %}

{% block title %}Baking recipes{% endblock %}

{% block content %}
<html>

<head>
  <title>Baking recipes</title>
</head>
<h2> recipes </h2>
{% if recipes %}
    <ul>
        {% for recipe in recipes %}
        <li><a href="/recipe/{{ recipe.id }}">{{ recipe.title }}</a></li>
        {% endfor %}
    </ul>
{% else %}
    <p> there are no recipes added yet</p>
{% endif %}
{% endblock %}
