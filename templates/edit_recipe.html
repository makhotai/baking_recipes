<!DOCTYPE html>
<html>

<head>
  <title>Recipe editing</title>
</head>

<body>
    <h1> recipe editing </h1>
    <form action="/update_recipe" method="post">

    <p>
      recipe name: <br />
      <input type="text" name="title" value="{{ recipe.title }}" size="40"/>
    </p>

    <p>
      description of the recipe: <br />
      <textarea name="description_r" rows="5" cols="60">{{ recipe.description_r }}</textarea>
    </p>

    <p>
      servings: <br />
      <input type="text" name="servings" value="{{ recipe.servings }}"/>
    </p>

    <p>
      ingredients: <br />
      <textarea name="ingredients" rows="5" cols="60">{{ recipe.ingredients }}</textarea>
    </p>

    <p>
      method: <br />
      <textarea name="method" rows="10" cols="60">{{ recipe.method }}</textarea>
    </p>

    <input type="hidden" name="recipe_id" value="{{ recipe.id }}" />
    <input type="submit" value="confirm changes" />
  </form>
</body>

</html>
