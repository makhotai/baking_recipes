{% extends "layout.html" %}

{% block title %}Search recipe{% endblock %}

{% block content %}
<h2>
    search recipe
</h2>
<form action="/find_recipe" method="get">
    <p>
        search by word: <input type="text" name="query" value="{{ query }}"size="30"/><br>
        <input type="submit" value="search"/>
    </p>

    {% if query %}
    <h3>the results for "{{ query }}"</h3>

    <ul>
        {% for recipe in results %}
        <li><a href="/recipe/{{ recipe.id }}">{{ recipe.title }}</a></li>
        {% endfor %}
    </ul>
    {% endif %}
</form>

{% endblock %}
